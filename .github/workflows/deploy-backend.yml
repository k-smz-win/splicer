name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

concurrency:
  group: deploy-backend
  cancel-in-progress: false  # Lambda デプロイは中断しない

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # OIDC による AWS 認証に必要
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      # serverless deploy が Lambda / API Gateway を自動構築する
      # JWT_SECRET は GitHub Secrets から注入する
      - name: Deploy with Serverless Framework
        run: cd backend && npx serverless deploy --stage prod
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
